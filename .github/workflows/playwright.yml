name: Playwright Tests
on:
  pull_request:
    branches: [ main, hotfix/* ]
  workflow_dispatch:
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/MobiFlightConnector/frontend
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    - name: Run linter
      run: npm run lint
    - name: Run Playwright tests
      env:
        TESTS_MEMBER_EMAIL: ${{ vars.TESTS_MEMBER_EMAIL }}
        TESTS_MEMBER_NAME: ${{ vars.TESTS_MEMBER_NAME }}
        TESTS_MEMBER_PASSWORD: ${{ secrets.TESTS_MEMBER_PASSWORD }}
        TESTS_BASIC_EMAIL: ${{ vars.TESTS_BASIC_EMAIL }}
        TESTS_BASIC_NAME: ${{ vars.TESTS_BASIC_NAME }}
        TESTS_BASIC_PASSWORD: ${{ secrets.TESTS_BASIC_PASSWORD }}
      run: npx playwright test
    - uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: src/MobiFlightConnector/frontend/playwright-report/
        retention-days: 30
